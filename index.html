<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CW Perú Odontología | Distribución Dental Premium</title>
    
    <!-- Librerías de React y Babel para procesar JSX en el navegador (Igual que en tu portafolio) -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Font Awesome (CSS estable para iconos) -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;700;900&display=swap');
        
        body { 
            font-family: 'Inter', sans-serif; 
            background-color: #f8fafc;
            margin: 0;
        }

        @keyframes fade-in { from { opacity: 0; } to { opacity: 1; } }
        @keyframes slide-up { from { opacity: 0; transform: translateY(40px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes slow-zoom { from { transform: scale(1); } to { transform: scale(1.15); } }
        @keyframes infinite-scroll { from { transform: translateX(0); } to { transform: translateX(-50%); } }
        @keyframes infinite-scroll-slow { from { transform: translateX(0); } to { transform: translateX(-33.33%); } }
        @keyframes bounce-slow { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-10px); } }

        .animate-fade-in { animation: fade-in 1.2s ease-out forwards; }
        .animate-slide-up { animation: slide-up 1s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
        .animate-slow-zoom { animation: slow-zoom 25s infinite alternate ease-in-out; }
        .animate-infinite-scroll { animation: infinite-scroll 35s linear infinite; }
        .animate-infinite-scroll-slow { animation: infinite-scroll-slow 50s linear infinite; }
        .animate-infinite-scroll-slow:hover { animation-play-state: paused; }
        .animate-bounce-slow { animation: bounce-slow 4s infinite ease-in-out; }
        
        .delay-300 { animation-delay: 0.3s; }
        .delay-500 { animation-delay: 0.5s; }

        .view-transition { animation: fade-in 0.5s ease-out; }
        
        /* Ocultar scrollbar pero permitir scroll */
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        const App = () => {
            const [isMenuOpen, setIsMenuOpen] = useState(false);
            const [scrolled, setScrolled] = useState(false);
            const [currentView, setCurrentView] = useState('home'); 
            const [activeCategory, setActiveCategory] = useState('Todas');
            const [activeBrand, setActiveBrand] = useState('Todas');

            useEffect(() => {
                const handleScroll = () => setScrolled(window.scrollY > 50);
                window.addEventListener('scroll', handleScroll);
                window.scrollTo(0, 0); 
                return () => window.removeEventListener('scroll', handleScroll);
            }, [currentView]);

            // Información RECUPERADA de Insumos/Equipos
            const categories = [
                { name: "Insumos", icon: "fa-solid fa-droplet" },
                { name: "Equipos", icon: "fa-solid fa-desktop" },

                { name: "Instrumental", icon: "fa-solid fa-stethoscope" },
                { name: "Línea Médica", icon: "fa-solid fa-shield-virus" }

            const brandLogos = [

                { name: "Miranda Mercedes", date: "Sep 21, 2025", stars: 5, text: "100% Recomendado, la atención es impecable y los productos originales.", img: "https://api.dicebear.com/7.x/avataaars/svg?seed=Miranda" },
                { name: "Clariza Tapullima", date: "Sep 21, 2025", stars: 5, text: "Excelente atención por parte de todo el personal, fui atendida de inmediato.", img: "https://api.dicebear.com/7.x/avataaars/svg?seed=Clariza" },

                { id: 2, title: "Compresora Hoffmann Silent 2HP", category: "Equipos", brand: "Hoffmann", price: 2100, img: "https://images.unsplash.com/photo-1581092160562-40aa08e78837?w=600" },
                { id: 3, title: "Unidad Dental Herford Pro-V", category: "Equipos", brand: "Herford", price: 12500, img: "https://images.unsplash.com/photo-1629909613654-28e377c37b09?w=600" },
                { id: 4, title: "Lámpara de Fotocurado Kulzer Translux", category: "Equipos", brand: "Kulzer", price: 950, img: "https://images.unsplash.com/photo-1593054999502-d9b002504485?w=600" },

                                <button onClick={() => setCurrentView('leads')} className={`hover:text-blue-500 transition-colors ${isHeaderSolid ? 'text-slate-600' : 'text-white'}`}>Suscríbete</button>
                                <button onClick={() => window.open('https://wa.me/51987654321', '_blank')} className="bg-blue-600 text-white px-6 py-2.5 rounded-full hover:bg-blue-700 transition-all shadow-lg hover:scale-105 active:scale-95 flex items-center gap-2">
                                    <i className="fa-brands fa-whatsapp text-lg"></i><span className="text-[10px]">VENTAS WTSPP</span>
                                </button>
                            </div>
                            <button className="md:hidden" onClick={() => setIsMenuOpen(!isMenuOpen)}>
                                {isMenuOpen ? <i className="fa-solid fa-xmark text-2xl"></i> : <i className={`fa-solid fa-bars text-2xl ${isHeaderSolid ? 'text-slate-900' : 'text-white'}`}></i>}
                            </button>
                        </div>
                    </nav>

                    {/* Menú Móvil */}
                    {isMenuOpen && (
                        <div className="fixed inset-0 bg-white z-[60] flex flex-col items-center justify-center gap-8 text-2xl font-bold md:hidden animate-fade-in">

                            <button onClick={() => {setCurrentView('home'); setIsMenuOpen(false);}}>Inicio</button>
                            <button onClick={() => {setCurrentView('shop'); setIsMenuOpen(false);}}>Productos</button>
                            <button onClick={() => {setCurrentView('catalogs'); setIsMenuOpen(false);}}>Catálogo</button>
                            <button onClick={() => {setCurrentView('leads'); setIsMenuOpen(false);}}>Suscríbete</button>
                            <button onClick={() => {window.open('https://wa.me/51987654321', '_blank'); setIsMenuOpen(false);}} className="bg-blue-600 text-white px-8 py-3 rounded-full text-lg">Contactar Ventas</button>
                        </div>
                    )}

                    {/* VISTA: HOME */}
                    {currentView === 'home' && (

                                </div>

                                        </div>
                                        <h1 className="text-4xl md:text-7xl font-black leading-tight mb-8 animate-slide-up" style={{ textShadow: '0 4px 16px rgba(0,0,0,0.6)' }}>Impulsando la <span className="text-blue-400">Excelencia Dental</span> en el Perú</h1>

                                            <button onClick={() => setCurrentView('catalogs')} className="bg-blue-600 text-white px-10 py-4 rounded-full font-black text-sm uppercase tracking-wider hover:bg-blue-700 transition-all shadow-xl">Explorar Catálogo <i className="fa-solid fa-chevron-right ml-2"></i></button>
                                            <button onClick={() => window.open('https://wa.me/51987654321', '_blank')} className="bg-white/10 backdrop-blur-md border border-white/20 text-white px-10 py-4 rounded-full font-black text-sm uppercase tracking-wider hover:bg-white/20 transition-all flex items-center gap-2"><i className="fa-brands fa-whatsapp text-lg"></i> Hablar con un Asesor</button>
                                        </div>
                                    </div>
                                </div>
                            </section>

                            <section className="py-16 -mt-16 relative z-20">

                                    <div className="grid grid-cols-2 md:grid-cols-4 lg:grid-cols-5 gap-4">
                                        {categories.map((cat, i) => (
                                            <button key={i} onClick={() => {setCurrentView('shop'); setActiveCategory(cat.name);}} className="bg-white p-6 rounded-2xl shadow-lg border border-slate-100 hover:shadow-2xl hover:-translate-y-1 transition-all group text-center">

                                            </button>

                                            </div>
